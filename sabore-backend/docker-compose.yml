services:
  postgres:
    image: postgres:16-alpine
    container_name: sabore-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sabore
    volumes:
      - sabore_pgdata:/var/lib/postgresql/data

volumes:
  sabore_pgdata:
